<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <title>Programa Números Perfeitos!</title>
</head>
<body>
    <!-- Elaborar um programa que leia um número e verifique se ele é ou não perfeito. Um número dito perfeito é aquele que é igual à soma dos seus divisores inteiros (exceto o próprio número). O programa deve exibir os divisores do número e a soma deles. -->

    <section>
        <img src="../../cap04/assets/exerc.jpg" alt="Caixa exercícios!">
    </section>
    <section>
        <h1>Programa Números Perfeitos:</h1>

        <form>
            <h2>
                <label for="numero" id="option">Número: </label>
                <input type="text" name="numbers" id="number" placeholder="Ex: 6, 28, 12">
            </h2>
        </form>

        <button id="button">Verificar se é perfeito: </button>

        <h3 id="resultado"></h3>
    </section>

    <script src="script.js"></script>
</body>
</html>
