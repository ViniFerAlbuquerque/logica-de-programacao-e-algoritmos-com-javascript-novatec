<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../cap04/assets/livrojs.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Programa Contas do Mês!</title>
</head>

<body>

    <section><img src="img/ex5_5.jpg" alt="Contas a Pagar!"></section>
    <section>
        <h1>Contas do Mês:</h1>

        <form>
            <h2>
                Descrição da Conta:
                <input type="text" id="inDescricao" required>
            </h2>
            <h2>
                Valor a Pagar R$: 
                <input type="number" min="0" step="0.01" id="inValor" required>
            </h2>
            <input type="submit" value="Registrar Conta">
        </form>

        <pre id="outResp1"></pre>
        <pre id="outResp2"></pre>
    </section>


    <script src="script.js"></script>
</body>

</html>
