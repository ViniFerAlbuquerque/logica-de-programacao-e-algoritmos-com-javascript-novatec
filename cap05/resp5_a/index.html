<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../cap04/assets/livrojs.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Programa Repete Fruta!</title>
</head>

<body>
    <!-- Elaborar um programa que leia o nome de uma fruta e um número. O programa deve repetir a exibição do nome da fruta, de acordo com o número informado. Ulilize o "*" para separar os nomes. -->

    <section>
        <img src="../../cap04/assets/exerc.jpg" alt="Figura atividades!">
    </section>

    <section>
        <h1>Programa Repete Fruta!</h1>

        <form>
            <h2>
                <label for="fruta">Fruta: </label>
                <input type="text">
            </h2>
            <h2>

                <label for="inNumero">Número: </label>
                <input type="number" name="number" id="number">
            </h2>
        </form>

        <button>Repetir Fruta:</button>

        <h3 id="resultado"></h3>
    </section>

    <script src="script.js"></script>
</body>

</html>
