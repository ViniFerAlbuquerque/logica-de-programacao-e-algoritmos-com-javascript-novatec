<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../cap04/assets/livrojs.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Programa Criação de Chinchilas!</title>
</head>

<body>
    <!-- Digamos que o número de chinchilas de uma fazenda triplica a cada ano, após o primeiro ano.
    Elaborar um programa que leia o número inicial de chinchilas e anos e informe ano a ano o número médio previsto de chinchilas da fazenda. O número inicial de chinchilas deve ser maior ou igual a 2 (um casal). -->

    <section>
        <img src="../../cap04/assets/exerc.jpg" alt="Exercício das Chinchilas!">
    </section>

    <section>
        <h1>Programa Criação de Chinchilas:</h1>
        <form>
            <h2>
                <label for="numChin" id="numChin">Nº Chinchilas:</label>
                <input type="number" name="quant" id="quant">
            </h2>

            <h2>
                <label for="numAnos" id="numAnos">Nº Anos: </label>
                <input type="number" name="totalAnos" id="totalAnos">
            </h2>
        </form>

        <button id="previsao">Mostrar Previsão de Chinchilas:</button>

        <h3 id="resultado"></h3>

    </section>

    <script src="script.js"></script>
</body>

</html>
