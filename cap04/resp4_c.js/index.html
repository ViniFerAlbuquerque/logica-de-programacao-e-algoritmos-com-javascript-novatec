<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/livrojs.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Programa Parquímetro!</title>
</head>

<body>
    <main>

        <img src="../assets/exerc.jpg" alt="Imagem Exercícios!">

        <section>
            <h1>Programa Parquímetro:</h1>
            <form id="parkingForm">
                <p>
                    <label for="value">Valor R$:</label>
                    <input type="number" id="value" name="value" placeholder="Valor em reais" min="0.10" step="0.01" required>
                </p>

                <button type="button" id="confirmDeposit">Confirmação!</button>
            </form>
            <h2 id="time"></h2>
            <h3 id="change"></h3>
        </section>

    </main>
    <script src="script.js"></script>
</body>

</html>
