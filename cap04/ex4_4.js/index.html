<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/livrojs.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Programa Fuso Horário!</title>
</head>

<body>
    <main>
        <img src="../assets/ex4_4.jpg" alt="Globo Terrestre!">

        <section>
            <h1>Programa Fuso Horário!</h1>
            <form action="FusoHorário">
                <p>Hora no Brasil (h,m):
                    <input type="number" name="inHoraBrasil" min="0" max="23:59" step="0.01" required id="inHoraBrasil">
                </p>
                <input type="submit" value="Exibir Hora na França!">
            </form>
            <h3></h3>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
