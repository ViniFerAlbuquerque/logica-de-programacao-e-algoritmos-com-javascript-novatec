<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de variáveis</title>
    <style>
        body {
            background-image: linear-gradient(to right, #241414, #999999);
        }
    </style>
</head>

<body>
    <Script>
        const fruta = "Banana"
        const preco = 3.50
        const levar = true
        let novoValor = 500.5

        console.log(typeof fruta) //string
        console.log(typeof preco) //number
        console.log(typeof levar) //boolean
        console.log(typeof novoValor) //undefined

        console.log(Number.isInteger(12)) //true
        console.log(Number.isInteger(3.50)) //false


        alert(`${fruta} + ${preco} + ${levar} ${novoValor}`);

    </Script>
</body>

</html>
