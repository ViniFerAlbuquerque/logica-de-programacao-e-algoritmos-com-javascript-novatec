<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo da duração de horas de uma viagem</title>
</head>
<body>
    <script>
        const dias = Number(prompt("N° Dias ")) //lê os dados 
        const horas = Number(prompt("N° Horas: "))
        const total = (dias * 24) + horas //calcula a duração
        alert(`Total de horas: ${total}`) //exibe o total
    </script>
</body>
</html>
