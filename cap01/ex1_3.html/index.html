<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <title>Operações envolvendo strings e números</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gradient: linear-gradient(
                    to right,
                    rgb(149 114 252),
                    rgb(67 231 173),
                    rgb(226 212 92)
                    )                 
        }

        body {

            font-family: 'Bebas Neue', sans-serif;

            background-image: linear-gradient(45deg, #F0FF00 , #008000 );

            color: #FFFFFF; 
        
            display: grid;
            place-content: center;
        }

        h1 {
            font-size: 3rem;
            background-image: var 
            (--gradient);

            background-clip: text;
            -webkit-background-clip: text;
            
            /* color: transparent; */
        }

        section {
            padding: 2rem;
            margin: 18rem;
            border: 4px solid #FFFFFF;

            border-image: var(--gradient) 2;

            border-radius: 15px;
        }


    </style>

</head>

<body>


        <section>
            <h1>Operações envolvendo strings e números</h1>
        </section>


</body>

    <script>
        const a = "20"
        const b = a * 2 // b = 40
        const c = a / 2 // c = 10
        const d = a - 2 // d = 18
        const e = a + 2 // e = 202
        const f = Number(a) // f = 20
        const g = f + 2 // g = 22

        alert("g: " + g) //exibe o valor de uma variável
        alert(`e: ${e}`)
    </script>

</html>
