<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operações envolvendo strings e números</title>
</head>
<body>
    <script>
        const a = "20"
        const b = a * 2 // b = 40
        const c = a / 2 // c = 10
        const d = a - 2 // d = 18
        const e = a + 2 // e = 202
        const f = Number(a) // f = 20
        const g = f + 2 // g = 22

        alert("g: " + g) //exibe o valor de uma variável
    </script>
</body>
</html>
