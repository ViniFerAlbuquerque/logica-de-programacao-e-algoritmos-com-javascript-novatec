<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1 HTML</title>
</head>
<body>
    <!--a)Elaborar um programa que leia um número. Calcule e informe os seus vizinhos, ou seja, o número anterior e posterior. -->
    <script>
        const num = Number(prompt("Digite seu número preferido: "))
        const numSmaller = num - 1
        const numBigger = num + 1
        alert(`O número anterior é: ${numSmaller}\nO número posterior é: ${numBigger}`)
    </script>
</body>
</html>
