    <title>Elaborar um programa para uma loja</title>
</head>
<body>

    <script>
        // Elaborar um programa para uma loja, o qual leia o preço de um produto e informe as opções de pagamento da loja.
        // Calcule e informe o valor para pagamento à vista com 10% de desconto e o valor em 3X.

        const product = Number(prompt("Preço do produto R$: "))
        const discount = (product * 0.1)
        const installment = (product/3)

        const inCash = (product-discount)
        const installments = (installment)

        alert(`À vista R$${inCash.toFixed(2)}\nOu 3x de R$${installments.toFixed(2)}`)
    </script>
</body>
