<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../cap04/assets/livrojs.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Jogo Descubra o Número!</title>
</head>
<body>
    <section><img src="./img/descubra-o-numero.jpg" alt="Imagem-dos-números!"></section>
    <section>
        <h1>Jogo Descubra o Número:</h1>
        <form>
            <h2>
                <label for="Número" id="Numero">Número:</label>
                <input type="number" min="1" max="100"  id="inNumero" required autofocus>
                <div>
                    <input type="submit" value="Apostar" id="btSubmit">
                    <input type="button" value="Jogar Novamente" id="btNovo" class="oculta">
                </div>
            </h2>
        </form>

        <h3 id="outDica" class="italico">Dica: É um número entre 1 e 100</h3>

    </section>
</body>
<script src="script.js"></script>
</html>
