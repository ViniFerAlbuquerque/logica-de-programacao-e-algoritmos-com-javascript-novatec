<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../cap04/assets/livrojs.png" type="image/x-icon">
    <title>Programa Revenda Herbie!</title>
</head>
<body>
    <section>
        <img src="img/revenda-herbie.jpg" alt="Revenda Herbie" class="alta">
    </section>

    <section>
        <h1>Revenda Herbie:</h1>
        <form >
            <h2>Modelo: <input type="text" id="inModelo" required autofocus></h2>
            <h2>
                <label for="preco">Preço R$:</label>
                <input type="number" id="inPreco" required>
                <input type="submit" value="Adicionar:">
            </h2>
            <input type="button" value="Listar Todos" id="btListar">
            <input type="button" value="Filtrar por Preço" id="btFiltrar">
            <input type="button" value="Simular Promoção" id="btSimular">
        </form>

        <pre></pre>
    </section>
</body>
</html>
